name: grev-openenv
version: "1.0.0"
description: >
  OpenEnv environment where AI agents are dropped into broken Python
  repositories and must fix them using only shell commands and file edits.
Grading is fully deterministic: score = pytest_passed / pytest_total.
tags:
  - openenv
  - devops
  - ci-cd
  - python
  - debugging
  - pytest
  - code-review
  - reinforcement-learning
author: "LangerSword"
license: MIT

tasks:
  - id: easy
    description: "Fix a syntax error in main.py — pytest fails on collection."
    difficulty: easy
    max_steps: 8
    reward_range: [0.0, 1.0]
    baseline_score: 1.0

  - id: medium
    description: "Fix a logic error in parser.py — tests import cleanly but assertions fail."
    difficulty: medium
    max_steps: 8
    reward_range: [0.0, 1.0]
    baseline_score: 1.0

  - id: hard
    description: "Fix a cross-file import mismatch between fetcher.py and test_fetcher.py."
    difficulty: hard
    max_steps: 8
    reward_range: [0.0, 1.0]
    baseline_score: 1.0

observation_space:
  type: object
  description: >
    Workspace state returned after every reset() and step(). Contains the
    current file listing, stdout/stderr from the last command, step counter,
    and done flag.
  fields:
    task_id: "Active task — easy | medium | hard"
    current_directory: "Absolute path to the agent's writable sandbox workspace"
    directory_contents: "List of all files in the workspace root"
    last_command_stdout: "Full stdout from the previous run_command action"
    last_command_stderr: "Full stderr from the previous run_command action"
    step: "Current step number, 1-indexed"
    max_steps: "Total step budget for this episode (8)"
    done: "True when all tests pass or step budget is exhausted"
    info: "Human-readable status hint from the environment"

action_space:
  type: object
  description: >
    Two action types. run_command executes any shell command in the sandbox
    with a 15-second timeout. edit_file overwrites a workspace file.
  actions:
    - run_command: >
        Execute a shell command in the sandboxed workspace.
        Required: command (str). Timeout: 15s.
        Useful commands: pytest, pytest -v, cat <file>, grep -n, ls, head.
    - edit_file: >
        Overwrite a workspace file with corrected content.
        Required: file_path (str), new_content (str).
        Writing outside workspace root returns reward=-0.10.

endpoints:
  health: GET /health
  tasks: GET /tasks
  reset: POST /reset
  step: POST /step
  state: GET /state
  grade: POST /grade

entry_point: grev.env:gREVEnv
models:
  observation: grev.models:Observation
  action: grev.models:Action
  reward: grev.models:Reward
